# ~/.config/starship.toml

# Inserts a blank line between shell prompts
add_newline = true

# Change command timeout from 500 to 1000 ms
command_timeout = 1000

# Change the default prompt format
format = """\
[в•ӯв•ҙ](238)$env_var\
$all[в•°в”Җ](238)$character"""
#
# Change the default prompt characters
[character]
success_symbol = "[п•“](238)"
error_symbol = "[п•“](238)"

# Shows an icon that should be included by zshrc script based on the distribution or os
[env_var.STARSHIP_DISTRO]
format = '[$env_value](white) '
variable = "STARSHIP_DISTRO"
disabled = false

# Shows the username
[username]
style_user = "white"
style_root = "white"
format = "[$user]($style) "
disabled = false
show_always = true

[hostname]
ssh_only = false
format = "on [$hostname](bold yellow) "
disabled = false

[directory]
truncation_length = 3
truncation_symbol = "вҖҰ/"
home_symbol = "пҹқ ~"
read_only_style = "197"
read_only = " пҖЈ "
format = "at [$path]($style)[$read_only]($read_only_style) "

[git_branch]
symbol = "пһЎ "
format = "via [$symbol$branch]($style) "
truncation_length = 4
truncation_symbol = "вҖҰ/"
style = "bold green"

[git_status]
format = '[\($all_status$ahead_behind\)]($style) '
style = "bold green"
conflicted = "рҹҸі"
up_to_date = "пҒҶ "
untracked = "п”© "
ahead = "вҮЎ${count}"
diverged = "вҮ•вҮЎ${ahead_count}вҮЈ${behind_count}"
behind = "вҮЈ${count}"
stashed = "пЈ– "
modified = "пҒ„ "
staged = '[++\($count\)](green)'
renamed = "иҘҒ "
deleted = "пҖ” "

[terraform]
format = "via [п„ө terraform $version]($style) еЈҹ [$workspace]($style) "

[vagrant]
format = "via [п„ө vagrant $version]($style) "

[docker_context]
format = "via [пҢҲ $context](bold blue) "

[helm]
format = "via [пҲҡ $version](bold purple) "

[python]
symbol = "п ҹ "
python_binary = "python3"

[nodejs]
format = "via [пўҳ $version](bold green) "
disabled = true

[ruby]
format = "via [оҲҫ $version]($style) "
